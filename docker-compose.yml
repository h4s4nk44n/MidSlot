version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: midslot
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/midslot?schema=public
      JWT_SECRET: smoke-test-jwt-secret-change-in-prod
      JWT_EXPIRES_IN: 1h
      REFRESH_TOKEN_SECRET: smoke-test-refresh-secret-change-in-prod
      REFRESH_TOKEN_EXPIRES_IN: 7d
      ALLOWED_ORIGINS: http://localhost:3001
    ports:
      - "5000:5000"
    command: >
      sh -c "npx prisma migrate deploy --schema=prisma/schema.prisma &&
             npx prisma db seed &&
             node dist/index.js"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  pgdata:
