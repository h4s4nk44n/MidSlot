# Run with: `docker compose up --build`
# Override behaviour by editing .env at the repo root (see .env.example).

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-midslot}
    # No `ports:` by default — DB is reachable only from inside the `medi`
    # network. Uncomment to expose on host (and pick a free host port).
    # ports:
    #   - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-midslot}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - medi

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      # Inside the compose network the DB host is the service name.
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-midslot}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_ACCESS_TTL:-1h}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-${JWT_SECRET}}
      REFRESH_TOKEN_EXPIRES_IN: ${JWT_REFRESH_TTL:-7d}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3001}
      CLINIC_TIMEZONE: ${CLINIC_TIMEZONE:-Europe/Istanbul}
    ports:
      - "${BACKEND_HOST_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - medi

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time. The browser must be able to
        # reach this URL — so for local dev it's the host-side backend port,
        # NOT the internal compose hostname.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      HOSTNAME: 0.0.0.0
    ports:
      - "${FRONTEND_HOST_PORT:-3001}:3001"
    networks:
      - medi

volumes:
  pgdata:

networks:
  medi:
    driver: bridge
